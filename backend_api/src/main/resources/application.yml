spring:
  application:
    name: judge

  datasource:
    url: jdbc:postgresql://localhost:5432/judge_db
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
